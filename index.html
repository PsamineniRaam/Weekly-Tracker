<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Weekly Tracker
    </title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #667eea,
                    #764ba2
                );

            min-height: 100vh;

            padding: 20px;
        }

        .container {

            max-width: 1200px;

            margin: auto;

            background: white;

            border-radius: 15px;

            padding: 25px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {

            text-align: center;

            margin-bottom: 25px;

            color: #333;
        }

        .summary-cards {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));

            gap: 20px;

            margin-bottom: 30px;
        }

        .summary-card {

            background:
                linear-gradient(
                    135deg,
                    #667eea,
                    #764ba2
                );

            color: white;

            padding: 20px;

            border-radius: 12px;

            text-align: center;
        }

        .summary-card h3 {

            margin-bottom: 10px;

            font-size: 16px;
        }

        .summary-card .amount {

            font-size: 24px;

            font-weight: bold;
        }

        .input-section {

            background: #f5f5f5;

            padding: 20px;

            border-radius: 12px;

            margin-bottom: 30px;
        }

        .input-grid {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));

            gap: 15px;
        }

        .input-group {

            display: flex;

            flex-direction: column;
        }

        .input-group label {

            margin-bottom: 5px;

            font-weight: bold;
        }

        .input-group input {

            padding: 10px;

            border: 1px solid #ccc;

            border-radius: 8px;

            font-size: 15px;
        }

        .btn-container {

            margin-top: 20px;

            display: flex;

            gap: 10px;

            flex-wrap: wrap;
        }

        button {

            border: none;

            padding: 12px 18px;

            border-radius: 8px;

            cursor: pointer;

            color: white;

            font-weight: bold;
        }

        .btn-add {
            background: #28a745;
        }

        .btn-update {
            background: #ffc107;
            color: black;
            display: none;
        }

        .btn-refresh {
            background: #17a2b8;
        }

        .btn-export {
            background: #6f42c1;
        }

        table {

            width: 100%;

            border-collapse: collapse;

            margin-top: 20px;
        }

        thead {

            background:
                linear-gradient(
                    135deg,
                    #667eea,
                    #764ba2
                );

            color: white;
        }

        th,
        td {

            padding: 12px;

            border: 1px solid #ddd;

            text-align: center;
        }

        tr:nth-child(even) {

            background: #f9f9f9;
        }

        .action-btn {

            padding: 6px 10px;

            border-radius: 5px;

            font-size: 13px;
        }

        .edit-btn {
            background: #007bff;
        }

        .delete-btn {
            background: #dc3545;
        }

        @media(max-width:768px){

            table {
                font-size: 13px;
            }

            .btn-container {
                flex-direction: column;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Weekly Tracker
        </h1>


        <div class="summary-cards">

            <div class="summary-card">

                <h3>
                    Total Principal
                </h3>

                <div
                    class="amount"
                    id="totalPrincipal"
                >
                    ₹0
                </div>

            </div>


            <div class="summary-card">

                <h3>
                    Total Amount Given
                </h3>

                <div
                    class="amount"
                    id="totalAmountGiven"
                >
                    ₹0
                </div>

            </div>


            <div class="summary-card">

                <h3>
                    Total Records
                </h3>

                <div
                    class="amount"
                    id="totalRecords"
                >
                    0
                </div>

            </div>

        </div>



        <div class="input-section">

            <div class="input-grid">

                <div class="input-group">

                    <label for="name">
                        Name *
                    </label>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter name"
                    >

                </div>


                <div class="input-group">

                    <label for="principal">
                        Principal Amount *
                    </label>

                    <input
                        type="number"
                        id="principal"
                        placeholder="Enter amount"
                    >

                </div>


                <div class="input-group">

                    <label for="date">
                        Date *
                    </label>

                    <input
                        type="date"
                        id="date"
                    >

                </div>


                <div class="input-group">

                    <label for="amountGiven">
                        Amount Given By Name
                    </label>

                    <input
                        type="number"
                        id="amountGiven"
                        placeholder="Optional"
                    >

                </div>

            </div>


            <input
                type="hidden"
                id="recordIndex"
            >


            <div class="btn-container">

                <button
                    class="btn-add"
                    id="addBtn"
                    onclick="addRecord()"
                >
                    Add Record
                </button>


                <button
                    class="btn-update"
                    id="updateBtn"
                    onclick="updateRecord()"
                >
                    Update Record
                </button>


                <button
                    class="btn-refresh"
                    onclick="loadRecords()"
                >
                    Refresh
                </button>


                <button
                    class="btn-export"
                    onclick="exportToCSV()"
                >
                    Export CSV
                </button>

            </div>

        </div>



        <table>

            <thead>

                <tr>

                    <th>#</th>

                    <th>Name</th>

                    <th>Principal</th>

                    <th>Date</th>

                    <th>Amount Given</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="tableBody">

                <tr>

                    <td colspan="6">
                        No Records Found
                    </td>

                </tr>

            </tbody>

        </table>

    </div>



<script>

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbxv9t3DU_qmQexGpN6Z9cWJk9fI82Fan_GCap2fy42O0ULythLsJh5ZiXZ4v1jduDgV/exec';


let records = [];


window.onload = function () {

    document.getElementById('date').valueAsDate =
        new Date();

    loadRecords();
};



// LOAD RECORDS

async function loadRecords() {

    try {

        const response =
            await fetch(SCRIPT_URL);

        const data =
            await response.json();

        records = data.data || [];

        renderTable();

        updateSummary();

    } catch (error) {

        console.error(error);

        alert('Error loading records');
    }
}



// ADD RECORD

async function addRecord() {

    const name =
        document.getElementById('name').value.trim();

    const principal =
        document.getElementById('principal').value;

    const date =
        document.getElementById('date').value;

    const amountGiven =
        document.getElementById('amountGiven').value;

    if (!name || !principal || !date) {

        alert('Please fill required fields');

        return;
    }

    const record = {

        action: 'add',

        id: Date.now(),

        name: name,

        principal: principal,

        date: date,

        amountGiven: amountGiven
    };

    try {

        await fetch(SCRIPT_URL, {

            method: 'POST',

            mode: 'no-cors',

            headers: {
                'Content-Type': 'text/plain'
            },

            body: JSON.stringify(record)
        });

        alert('Record Added');

        clearForm();

        setTimeout(() => {

            loadRecords();

        }, 1500);

    } catch (error) {

        console.error(error);

        alert('Error adding record');
    }
}



// EDIT RECORD

function editRecord(index) {

    const record = records[index];

    let formattedDate = '';

    if (record.Date) {

        const d = new Date(record.Date);

        formattedDate =
            d.getFullYear() + '-' +
            String(d.getMonth() + 1).padStart(2, '0') + '-' +
            String(d.getDate()).padStart(2, '0');
    }

    document.getElementById('name').value =
        record.Name;

    document.getElementById('principal').value =
        record.Principal;

    document.getElementById('date').value =
        formattedDate;

    document.getElementById('amountGiven').value =
        record.AmountGiven;

    document.getElementById('recordIndex').value =
        index;

    document.getElementById('addBtn').style.display =
        'none';

    document.getElementById('updateBtn').style.display =
        'inline-block';
}



// UPDATE RECORD

async function updateRecord() {

    const index =
        document.getElementById('recordIndex').value;

    const record = records[index];

    const updatedRecord = {

        action: 'update',

        id: record.ID,

        name:
            document.getElementById('name').value,

        principal:
            document.getElementById('principal').value,

        date:
            document.getElementById('date').value,

        amountGiven:
            document.getElementById('amountGiven').value
    };

    try {

        await fetch(SCRIPT_URL, {

            method: 'POST',

            mode: 'no-cors',

            headers: {
                'Content-Type': 'text/plain'
            },

            body: JSON.stringify(updatedRecord)
        });

        alert('Record Updated');

        clearForm();

        document.getElementById('addBtn').style.display =
            'inline-block';

        document.getElementById('updateBtn').style.display =
            'none';

        setTimeout(() => {

            loadRecords();

        }, 1500);

    } catch (error) {

        console.error(error);

        alert('Error updating record');
    }
}



// DELETE RECORD

async function deleteRecord(index) {

    const confirmDelete =
        confirm('Delete this record?');

    if (!confirmDelete) return;

    const record = records[index];

    try {

        await fetch(SCRIPT_URL, {

            method: 'POST',

            mode: 'no-cors',

            headers: {
                'Content-Type': 'text/plain'
            },

            body: JSON.stringify({

                action: 'delete',

                id: record.ID
            })
        });

        alert('Record Deleted');

        setTimeout(() => {

            loadRecords();

        }, 1500);

    } catch (error) {

        console.error(error);

        alert('Error deleting record');
    }
}



// RENDER TABLE

function renderTable() {

    const tbody =
        document.getElementById('tableBody');

    if (records.length === 0) {

        tbody.innerHTML = `
            <tr>
                <td colspan="6">
                    No Records Found
                </td>
            </tr>
        `;

        return;
    }

    tbody.innerHTML = '';

    records.forEach((record, index) => {

        tbody.innerHTML += `

            <tr>

                <td>${index + 1}</td>

                <td>${record.Name}</td>

                <td>
                    ₹${Number(record.Principal)
                        .toLocaleString('en-IN')}
                </td>

                <td>${record.Date}</td>

                <td>
                    ${record.AmountGiven || '-'}
                </td>

                <td>

                    <button
                        class="action-btn edit-btn"
                        onclick="editRecord(${index})"
                    >
                        Edit
                    </button>

                    <button
                        class="action-btn delete-btn"
                        onclick="deleteRecord(${index})"
                    >
                        Delete
                    </button>

                </td>

            </tr>
        `;
    });
}



// UPDATE SUMMARY

function updateSummary() {

    const totalPrincipal =
        records.reduce((sum, record) => {

            return sum +
                Number(record.Principal || 0);

        }, 0);


    const totalAmountGiven =
        records.reduce((sum, record) => {

            return sum +
                Number(record.AmountGiven || 0);

        }, 0);


    document.getElementById('totalPrincipal')
        .innerText =
        '₹' +
        totalPrincipal.toLocaleString('en-IN');


    document.getElementById('totalAmountGiven')
        .innerText =
        '₹' +
        totalAmountGiven.toLocaleString('en-IN');


    document.getElementById('totalRecords')
        .innerText =
        records.length;
}



// CLEAR FORM

function clearForm() {

    document.getElementById('name').value = '';

    document.getElementById('principal').value = '';

    document.getElementById('amountGiven').value = '';

    document.getElementById('date').valueAsDate =
        new Date();
}



// EXPORT CSV

function exportToCSV() {

    if (records.length === 0) {

        alert('No records found');

        return;
    }

    let csv =
        'Name,Principal,Date,Amount Given\n';

    records.forEach(record => {

        csv +=
            `${record.Name},` +
            `${record.Principal},` +
            `${record.Date},` +
            `${record.AmountGiven}\n`;
    });

    const blob =
        new Blob([csv], {
            type: 'text/csv'
        });

    const url =
        window.URL.createObjectURL(blob);

    const a =
        document.createElement('a');

    a.href = url;

    a.download =
        'weekly-tracker.csv';

    a.click();

    window.URL.revokeObjectURL(url);
}

</script>

</body>
</html>
