<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Interest Tracker</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .card .value {
            font-size: 28px;
            font-weight: bold;
        }

        .form-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add {
            background: #28a745;
            color: white;
        }

        .btn-update {
            background: #ffc107;
            color: #333;
            display: none;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
            display: none;
        }

        .btn-refresh {
            background: #17a2b8;
            color: white;
        }

        .btn-export {
            background: #007bff;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            background: #007bff;
            color: white;
            padding: 6px 12px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 6px 12px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        @media(max-width:768px) {

            .container {
                padding: 15px;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 10px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>💰 Weekly Interest Tracker</h1>

    <div class="summary-cards">

        <div class="card">
            <h3>Total Principal</h3>
            <div class="value" id="totalPrincipal">₹0</div>
        </div>

        <div class="card">
            <h3>Total Weekly Interest</h3>
            <div class="value" id="totalInterest">₹0</div>
        </div>

        <div class="card">
            <h3>Total Records</h3>
            <div class="value" id="totalRecords">0</div>
        </div>

    </div>

    <div class="form-section">

        <div class="form-grid">

            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter name">
            </div>

            <div class="form-group">
                <label>Principal Amount (₹)</label>
                <input type="number" id="principal" placeholder="Enter amount">
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date">
            </div>

            <div class="form-group">
                <label>Rate of Interest (% per week)</label>
                <input type="number" id="rate" placeholder="Enter weekly interest rate">
            </div>

        </div>

        <div class="btn-container">

            <button class="btn-add" id="addBtn" onclick="addRecord()">
                ➕ Add Record
            </button>

            <button class="btn-update" id="updateBtn" onclick="updateRecord()">
                ✏️ Update
            </button>

            <button class="btn-cancel" id="cancelBtn" onclick="cancelEdit()">
                ❌ Cancel
            </button>

            <button class="btn-refresh" onclick="loadRecords()">
                🔄 Refresh
            </button>

            <button class="btn-export" onclick="exportCSV()">
                📥 Export CSV
            </button>

        </div>

    </div>

    <div style="overflow-x:auto;">

        <table>

            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Principal</th>
                    <th>Date</th>
                    <th>Rate/Week</th>
                    <th>Weekly Interest</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="tableBody">

                <tr>
                    <td colspan="7" class="empty">
                        No Records Found
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

    // PASTE NEW WEEKLY APPS SCRIPT URL HERE
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5BgpfjHA9X3PuZUIOt-IT1ne_n4U1RtlL_Pa39R_fg3I_A4_ejzcqlBfNuIS5yKxPcA/exec';

    let records = [];
    let editingId = null;

    document.getElementById('date').valueAsDate = new Date();

    window.onload = function () {
        loadRecords();
    };

    async function loadRecords() {

        try {

            const response = await fetch(SCRIPT_URL);
            const result = await response.json();

            if (result.status === 'success') {

                records = result.data.map(record => ({
                    id: record.ID || '',
                    name: record.Name || '',
                    principal: parseFloat(record.Principal || 0),
                    date: record.Date || '',
                    rate: parseFloat(record.Rate || 0),
                    weeklyInterest: parseFloat(record.WeeklyInterest || 0)
                }));

                renderTable();
                updateSummary();
            }

        } catch (error) {

            console.error(error);
            alert('Error loading records');

        }
    }

    async function addRecord() {

        const name = document.getElementById('name').value.trim();
        const principal = parseFloat(document.getElementById('principal').value);
        const date = document.getElementById('date').value;
        const rate = parseFloat(document.getElementById('rate').value);

        if (!name || !principal || !date || !rate) {
            alert('Please fill all fields');
            return;
        }

        const weeklyInterest =
            ((principal * rate) / 100).toFixed(2);

        const record = {
            action: 'add',
            id: Date.now(),
            name,
            principal,
            date,
            rate,
            weeklyInterest
        };

        try {

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(record)
            });

            const result = await response.json();

            if (result.status === 'success') {

                clearForm();
                loadRecords();

            }

        } catch (error) {

            console.error(error);
            alert('Error saving record');

        }
    }

    function editRecord(index) {

        const record = records[index];

        editingId = record.id;

        document.getElementById('name').value = record.name;
        document.getElementById('principal').value = record.principal;
        document.getElementById('date').value = record.date;
        document.getElementById('rate').value = record.rate;

        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'inline-block';
        document.getElementById('cancelBtn').style.display = 'inline-block';

        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });

    }

    async function updateRecord() {

        const name = document.getElementById('name').value.trim();
        const principal = parseFloat(document.getElementById('principal').value);
        const date = document.getElementById('date').value;
        const rate = parseFloat(document.getElementById('rate').value);

        const weeklyInterest =
            ((principal * rate) / 100).toFixed(2);

        const record = {
            action: 'update',
            id: editingId,
            name,
            principal,
            date,
            rate,
            weeklyInterest
        };

        try {

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(record)
            });

            const result = await response.json();

            if (result.status === 'success') {

                cancelEdit();
                loadRecords();

            }

        } catch (error) {

            console.error(error);
            alert('Error updating record');

        }
    }

    async function deleteRecord(index) {

        if (!confirm('Delete this record?')) return;

        try {

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'delete',
                    id: records[index].id
                })
            });

            const result = await response.json();

            if (result.status === 'success') {
                loadRecords();
            }

        } catch (error) {

            console.error(error);
            alert('Error deleting record');

        }
    }

    function cancelEdit() {

        editingId = null;

        clearForm();

        document.getElementById('addBtn').style.display = 'inline-block';
        document.getElementById('updateBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';

    }

    function renderTable() {

        const tbody = document.getElementById('tableBody');

        if (records.length === 0) {

            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="empty">
                        No Records Found
                    </td>
                </tr>
            `;

            return;
        }

        tbody.innerHTML = records.map((record, index) => `

            <tr>

                <td>${index + 1}</td>

                <td><strong>${record.name}</strong></td>

                <td>
                    ₹${record.principal.toLocaleString('en-IN')}
                </td>

                <td>
                    ${formatDate(record.date)}
                </td>

                <td>
                    ${record.rate}%
                </td>

                <td>
                    ₹${record.weeklyInterest}
                </td>

                <td>

                    <div class="action-buttons">

                        <button class="btn-edit"
                            onclick="editRecord(${index})">
                            ✏️
                        </button>

                        <button class="btn-delete"
                            onclick="deleteRecord(${index})">
                            🗑️
                        </button>

                    </div>

                </td>

            </tr>

        `).join('');

    }

    function updateSummary() {

        const totalPrincipal =
            records.reduce((sum, r) => sum + r.principal, 0);

        const totalInterest =
            records.reduce((sum, r) =>
                sum + parseFloat(r.weeklyInterest), 0);

        document.getElementById('totalPrincipal').textContent =
            '₹' + totalPrincipal.toLocaleString('en-IN');

        document.getElementById('totalInterest').textContent =
            '₹' + totalInterest.toLocaleString('en-IN');

        document.getElementById('totalRecords').textContent =
            records.length;

    }

    function clearForm() {

        document.getElementById('name').value = '';
        document.getElementById('principal').value = '';
        document.getElementById('rate').value = '';
        document.getElementById('date').valueAsDate = new Date();

    }

    function formatDate(dateString) {

        return new Date(dateString).toLocaleDateString('en-IN', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });

    }

    function exportCSV() {

        if (records.length === 0) {
            alert('No data to export');
            return;
        }

        let csv =
            'Name,Principal Amount,Date,Rate (% per week),Weekly Interest\n';

        records.forEach(record => {

            csv += `"${record.name}",${record.principal},"${record.date}",${record.rate},${record.weeklyInterest}\n`;

        });

        const blob = new Blob([csv], {
            type: 'text/csv'
        });

        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');

        a.href = url;

        a.download =
            `weekly-interest-records-${new Date().toISOString().split('T')[0]}.csv`;

        a.click();

        URL.revokeObjectURL(url);

    }

</script>

</body>
</html>
